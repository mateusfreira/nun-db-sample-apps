<!DOCTYPE html>
<html>
<head>
    <title>VoxelCraft Simple Test</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: Arial, sans-serif;
        }
        #info {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 10px;
            border-radius: 5px;
        }
        canvas {
            display: block;
        }
    </style>
</head>
<body>
    <div id="info">
        <h3>VoxelCraft Simple Test</h3>
        <p>Status: <span id="status">Loading...</span></p>
        <p>Controls: WASD to move camera</p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/three@0.159.0/build/three.min.js"></script>
    <script>
        let camera, scene, renderer;
        let cube;

        function init() {
            const status = document.getElementById('status');
            
            try {
                // Scene
                scene = new THREE.Scene();
                scene.background = new THREE.Color(0x87CEEB);
                
                // Camera
                camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
                camera.position.set(5, 5, 5);
                camera.lookAt(0, 0, 0);
                
                // Renderer
                renderer = new THREE.WebGLRenderer({ antialias: true });
                renderer.setSize(window.innerWidth, window.innerHeight);
                document.body.appendChild(renderer.domElement);
                
                // Lighting
                const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
                scene.add(ambientLight);
                
                const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
                directionalLight.position.set(10, 10, 10);
                scene.add(directionalLight);
                
                // Create a simple cube
                const geometry = new THREE.BoxGeometry(1, 1, 1);
                const material = new THREE.MeshLambertMaterial({ color: 0x00ff00 });
                cube = new THREE.Mesh(geometry, material);
                scene.add(cube);
                
                // Create ground
                const groundGeometry = new THREE.PlaneGeometry(20, 20);
                const groundMaterial = new THREE.MeshLambertMaterial({ color: 0x808080 });
                const ground = new THREE.Mesh(groundGeometry, groundMaterial);
                ground.rotation.x = -Math.PI / 2;
                scene.add(ground);
                
                status.textContent = 'Running - Three.js works!';
                
                // Handle keyboard
                const keys = {};
                document.addEventListener('keydown', (e) => {
                    keys[e.code] = true;
                });
                document.addEventListener('keyup', (e) => {
                    keys[e.code] = false;
                });
                
                // Animation loop
                function animate() {
                    requestAnimationFrame(animate);
                    
                    // Rotate cube
                    cube.rotation.x += 0.01;
                    cube.rotation.y += 0.01;
                    
                    // Move camera with WASD
                    const speed = 0.1;
                    if (keys['KeyW']) camera.position.z -= speed;
                    if (keys['KeyS']) camera.position.z += speed;
                    if (keys['KeyA']) camera.position.x -= speed;
                    if (keys['KeyD']) camera.position.x += speed;
                    
                    camera.lookAt(0, 0, 0);
                    
                    renderer.render(scene, camera);
                }
                
                animate();
                
            } catch (error) {
                status.textContent = 'Error: ' + error.message;
                console.error('Initialization error:', error);
            }
        }

        // Handle window resize
        window.addEventListener('resize', () => {
            if (camera && renderer) {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            }
        });

        // Initialize when Three.js is loaded
        if (typeof THREE !== 'undefined') {
            init();
        } else {
            document.getElementById('status').textContent = 'Three.js not loaded';
        }
    </script>
</body>
</html>
